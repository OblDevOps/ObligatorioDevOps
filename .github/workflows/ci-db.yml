name: CI/CD - Database

on:
  push:
    branches: [main]
    paths:
      - "src/db/**"
      - ".github/workflows/ci-db.yml"
  pull_request:
    branches: [main]
    paths:
      - "src/db/**"
  workflow_dispatch:

env:
  AWS_REGION: us-east-1

jobs:
  secrets-scan:
    name: Secrets Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Detect secrets (TruffleHog)
        uses: trufflesecurity/trufflehog@9b6b5326bfe25dbd856eccc8a8275eb5dea7bd52 # main
        with:
          path: ./
          base: ${{ github.event.before }}
          head: ${{ github.event.after }}
          extra_args: --only-verified

  validate-sql:
    name: Validate SQL
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: orders
          POSTGRES_USER: retail_user
          POSTGRES_PASSWORD: testpassword
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Run init SQL
        env:
          PGPASSWORD: testpassword
        run: |
          psql -h localhost -U retail_user -d orders -f src/db/init-db.sql

      - name: Verify databases and schema
        env:
          PGPASSWORD: testpassword
        run: |
          psql -h localhost -U retail_user -d catalogdb -c "SELECT 1"
          psql -h localhost -U retail_user -d cartdb -c "SELECT COUNT(*) FROM cart_items"
